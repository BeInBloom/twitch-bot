<svg xmlns="http://www.w3.org/2000/svg" width="2100" height="1260" viewBox="0 0 2100 1260">
  <defs>
    <style>
      .bg { fill: #f7f5ef; }
      .title { font: 700 30px "DejaVu Sans", sans-serif; fill: #1e293b; }
      .subtitle { font: 400 16px "DejaVu Sans", sans-serif; fill: #475569; }
      .label { font: 600 16px "DejaVu Sans", sans-serif; fill: #0f172a; }
      .small { font: 400 13px "DejaVu Sans", sans-serif; fill: #334155; }
      .legend { font: 600 14px "DejaVu Sans", sans-serif; fill: #0f172a; }
      .router { fill: #dbeafe; stroke: #2563eb; }
      .projector { fill: #dcfce7; stroke: #16a34a; }
      .middleware { fill: #fef3c7; stroke: #d97706; }
      .handler { fill: #fce7f3; stroke: #db2777; }
      .future { fill: #e2e8f0; stroke: #64748b; stroke-dasharray: 8 6; }
      .box { stroke-width: 2.5; rx: 18; ry: 18; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#475569" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="2100" height="1260" />

  <text class="title" x="60" y="60">Event Processing Pipeline</text>
  <text class="subtitle" x="60" y="90">Root router chooses the branch. Projectors narrow request types. Middleware stays local to the stage.</text>

  <rect class="router box" x="60" y="190" width="190" height="64" />
  <text class="label" x="155" y="227" text-anchor="middle">EventSource</text>

  <rect class="middleware box" x="330" y="190" width="210" height="64" />
  <text class="label" x="435" y="220" text-anchor="middle">Global Middleware</text>
  <text class="small" x="435" y="240" text-anchor="middle">logging, metrics, panic guard</text>

  <rect class="router box" x="620" y="190" width="220" height="64" />
  <text class="label" x="730" y="220" text-anchor="middle">EventRouter&lt;Event&gt;</text>
  <text class="small" x="730" y="240" text-anchor="middle">match on event kind</text>

  <path class="arrow" d="M250 222 H330" />
  <path class="arrow" d="M540 222 H620" />

  <rect class="projector box" x="980" y="60" width="220" height="64" />
  <text class="label" x="1090" y="90" text-anchor="middle">ChatProjector</text>
  <text class="small" x="1090" y="110" text-anchor="middle">Event -&gt; ChatRequest</text>

  <rect class="middleware box" x="1260" y="60" width="220" height="64" />
  <text class="label" x="1370" y="90" text-anchor="middle">Chat Middleware</text>
  <text class="small" x="1370" y="110" text-anchor="middle">chat-level policies</text>

  <rect class="router box" x="1540" y="60" width="240" height="64" />
  <text class="label" x="1660" y="90" text-anchor="middle">ChatRouter&lt;ChatRequest&gt;</text>
  <text class="small" x="1660" y="110" text-anchor="middle">plain vs command</text>

  <rect class="handler box" x="1840" y="20" width="190" height="64" />
  <text class="label" x="1935" y="58" text-anchor="middle">PlainMessageHandler</text>

  <rect class="projector box" x="1840" y="120" width="190" height="64" />
  <text class="label" x="1935" y="150" text-anchor="middle">CommandProjector</text>
  <text class="small" x="1935" y="170" text-anchor="middle">ChatRequest -&gt; CommandRequest</text>

  <rect class="middleware box" x="1840" y="220" width="190" height="64" />
  <text class="label" x="1935" y="250" text-anchor="middle">Command Middleware</text>

  <rect class="router box" x="1840" y="320" width="190" height="64" />
  <text class="label" x="1935" y="350" text-anchor="middle">CommandRouter</text>
  <text class="small" x="1935" y="370" text-anchor="middle">match command name</text>

  <rect class="handler box" x="1840" y="420" width="190" height="64" />
  <text class="label" x="1935" y="458" text-anchor="middle">MusicHandler</text>

  <rect class="handler box" x="1840" y="510" width="190" height="64" />
  <text class="label" x="1935" y="548" text-anchor="middle">SkipHandler</text>

  <rect class="handler box" x="1840" y="600" width="190" height="64" />
  <text class="label" x="1935" y="630" text-anchor="middle">UnknownCommand</text>
  <text class="small" x="1935" y="650" text-anchor="middle">fallback handler</text>

  <path class="arrow" d="M840 222 C910 222, 910 92, 980 92" />
  <text class="small" x="900" y="110">ChatMessage</text>
  <path class="arrow" d="M1200 92 H1260" />
  <path class="arrow" d="M1480 92 H1540" />
  <path class="arrow" d="M1780 92 C1810 92, 1810 52, 1840 52" />
  <path class="arrow" d="M1780 92 C1810 92, 1810 152, 1840 152" />
  <text class="small" x="1815" y="46">Plain</text>
  <text class="small" x="1815" y="148">Command</text>
  <path class="arrow" d="M1935 184 V220" />
  <path class="arrow" d="M1935 284 V320" />
  <path class="arrow" d="M1935 384 V420" />
  <path class="arrow" d="M1935 384 C2035 384, 2035 542, 2035 542 H2030" />
  <path class="arrow" d="M1935 384 C2035 384, 2035 632, 2035 632 H2030" />
  <text class="small" x="2020" y="448" text-anchor="end">music</text>
  <text class="small" x="2020" y="538" text-anchor="end">skip</text>
  <text class="small" x="2020" y="628" text-anchor="end">fallback</text>

  <rect class="projector box" x="980" y="470" width="220" height="64" />
  <text class="label" x="1090" y="500" text-anchor="middle">RewardProjector</text>
  <text class="small" x="1090" y="520" text-anchor="middle">Event -&gt; RewardRequest</text>

  <rect class="middleware box" x="1260" y="470" width="220" height="64" />
  <text class="label" x="1370" y="500" text-anchor="middle">Reward Middleware</text>
  <text class="small" x="1370" y="520" text-anchor="middle">rate limit, cooldown</text>

  <rect class="router box" x="1540" y="470" width="240" height="64" />
  <text class="label" x="1660" y="500" text-anchor="middle">RewardRouter&lt;RewardRequest&gt;</text>
  <text class="small" x="1660" y="520" text-anchor="middle">match reward kind</text>

  <rect class="handler box" x="1840" y="700" width="190" height="64" />
  <text class="label" x="1935" y="738" text-anchor="middle">Reward1Handler</text>

  <rect class="handler box" x="1840" y="790" width="190" height="64" />
  <text class="label" x="1935" y="828" text-anchor="middle">Reward2Handler</text>

  <rect class="handler box" x="1840" y="880" width="190" height="64" />
  <text class="label" x="1935" y="910" text-anchor="middle">RewardNHandler</text>
  <text class="small" x="1935" y="930" text-anchor="middle">future leaf</text>

  <path class="arrow" d="M840 222 C910 222, 910 502, 980 502" />
  <text class="small" x="885" y="380">RewardRedemption</text>
  <path class="arrow" d="M1200 502 H1260" />
  <path class="arrow" d="M1480 502 H1540" />
  <path class="arrow" d="M1780 502 C1830 502, 1870 732, 1840 732" />
  <path class="arrow" d="M1780 502 C1830 502, 1870 822, 1840 822" />
  <path class="arrow" d="M1780 502 C1830 502, 1870 912, 1840 912" />
  <text class="small" x="1815" y="730">reward_1</text>
  <text class="small" x="1815" y="820">reward_2</text>
  <text class="small" x="1815" y="910">reward_n</text>

  <rect class="projector box" x="980" y="760" width="220" height="64" />
  <text class="label" x="1090" y="790" text-anchor="middle">SystemProjector</text>
  <text class="small" x="1090" y="810" text-anchor="middle">Event -&gt; SystemRequest</text>

  <rect class="handler box" x="1260" y="760" width="220" height="64" />
  <text class="label" x="1370" y="790" text-anchor="middle">SystemHandler</text>
  <text class="small" x="1370" y="810" text-anchor="middle">unsupported, diagnostics</text>

  <path class="arrow" d="M840 222 C910 222, 910 792, 980 792" />
  <text class="small" x="875" y="660">System / Unsupported</text>
  <path class="arrow" d="M1200 792 H1260" />

  <rect class="projector future box" x="980" y="920" width="220" height="64" />
  <text class="label" x="1090" y="950" text-anchor="middle">SubscriptionProjector</text>
  <text class="small" x="1090" y="970" text-anchor="middle">future branch</text>

  <rect class="middleware future box" x="1260" y="920" width="220" height="64" />
  <text class="label" x="1370" y="950" text-anchor="middle">Subscription Middleware</text>

  <rect class="handler future box" x="1540" y="920" width="240" height="64" />
  <text class="label" x="1660" y="958" text-anchor="middle">SubscriptionHandler</text>

  <path class="arrow" d="M840 222 C910 222, 910 952, 980 952" />
  <text class="small" x="885" y="885">Subscribe</text>
  <path class="arrow" d="M1200 952 H1260" />
  <path class="arrow" d="M1480 952 H1540" />

  <rect class="projector future box" x="980" y="1030" width="220" height="64" />
  <text class="label" x="1090" y="1060" text-anchor="middle">RaidProjector</text>
  <text class="small" x="1090" y="1080" text-anchor="middle">future branch</text>

  <rect class="middleware future box" x="1260" y="1030" width="220" height="64" />
  <text class="label" x="1370" y="1060" text-anchor="middle">Raid Middleware</text>

  <rect class="handler future box" x="1540" y="1030" width="240" height="64" />
  <text class="label" x="1660" y="1068" text-anchor="middle">RaidHandler</text>

  <path class="arrow" d="M840 222 C910 222, 910 1062, 980 1062" />
  <text class="small" x="900" y="995">Raid</text>
  <path class="arrow" d="M1200 1062 H1260" />
  <path class="arrow" d="M1480 1062 H1540" />

  <rect x="60" y="1140" width="1440" height="84" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
  <text class="legend" x="90" y="1172">Legend</text>
  <rect class="router box" x="180" y="1150" width="120" height="40" />
  <text class="small" x="240" y="1176" text-anchor="middle">Router</text>
  <rect class="projector box" x="330" y="1150" width="120" height="40" />
  <text class="small" x="390" y="1176" text-anchor="middle">Projector</text>
  <rect class="middleware box" x="480" y="1150" width="140" height="40" />
  <text class="small" x="550" y="1176" text-anchor="middle">Middleware</text>
  <rect class="handler box" x="650" y="1150" width="120" height="40" />
  <text class="small" x="710" y="1176" text-anchor="middle">Handler</text>
  <rect class="future box" x="800" y="1150" width="180" height="40" />
  <text class="small" x="890" y="1176" text-anchor="middle">Future branch</text>
  <text class="small" x="1020" y="1176">Projectors are the stage boundaries where request types narrow.</text>
</svg>
